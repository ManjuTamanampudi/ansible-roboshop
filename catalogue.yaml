- name: catalogue instance creation
  hosts: catalogue
  become: yes
  tasks:

  - name: enable node version
    ansible.builtin.command: dnf module install nodejs:20 -y
   
  - name: install nodejs
    ansible.builtin.dnf:
     name: nodejs 
     state: present

  - name: create system user
    ansible.builtin.user:
     name: roboshop 
     system: yes
     home: /app
     shell: /sbin/nologin
     comment: "roboshop system user" 

  - name: createa directory
    ansible.builtin.file:
     path: /app 
     state: directory

  - name: get url
    ansible.builtin.get_url:
     url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip 
     dest: /tmp/catalogue.zip

  - name: unarchive file  
    ansible.builtin.unarchive:
     src: /tmp/catalogue.zip
     dest: /app
     remote_src: yes

  - name: Install npm packages
    community.general.npm:
      path: /app
      state: present  

  - name: Copy a catalogue service file
    ansible.builtin.template:
      src: catalogue.service   # Path on the control machine
      dest: /etc/systemd/system/catalogue.service # Path on the remote host

  - name: Copy a mongo repo
    ansible.builtin.copy:
      src: mongo.repo   
      dest: /etc/yum.repos.d/mongo.repo

  - name: Install mongodb-mongosh
    ansible.builtin.dnf:
     name: mongodb-mongosh
     state: present

  - name: check products loaded
    ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output

  - name: print the output
    ansible.builtin.debug:
      msg: "{{ catalogue_output }}"

  - name: load the products
    ansible.builtin.shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
    when: catalogue_output.stdout  | int < 0

  - name: Reload systemd 
    ansible.builtin.systemd:
      daemon_reload: yes

  - name: Start service catalogue
    ansible.builtin.service:
     name: catalogue
     state: started
     enabled: yes
       

  